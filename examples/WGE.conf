# ModSecurity Configuration Example
# SecLang Syntax Demonstration

# ============================================
# 基础配置
# ============================================
SecRuleEngine On
SecRequestBodyAccess On
SecRequestBodyLimit 13107200
SecRequestBodyNoFilesLimit 131072
SecRequestBodyLimitAction Reject

SecResponseBodyAccess On
SecResponseBodyMimeType text/plain text/html text/xml
SecResponseBodyLimit 524288

# ============================================
# 审计日志配置
# ============================================
SecAuditEngine RelevantOnly
SecAuditLog /var/log/modsec_audit.log
SecAuditLogParts ABIJDEFHZ
SecAuditLogType Serial

# ============================================
# 调试配置
# ============================================
SecDebugLog /var/log/modsec_debug.log
SecDebugLogLevel 3

# ============================================
# 默认动作
# ============================================
SecDefaultAction "phase:1,log,auditlog,pass"
SecDefaultAction "phase:2,log,auditlog,pass"

# ============================================
# SQL 注入检测规则
# ============================================
SecRule ARGS|REQUEST_BODY "@detectSQLi" \
    "id:100001,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    msg:'SQL Injection Attack Detected',\
    logdata:'Matched Data: %{MATCHED_VAR} found within %{MATCHED_VAR_NAME}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS',\
    tag:'paranoia-level/1',\
    severity:'CRITICAL',\
    setvar:'tx.sql_injection_score=+%{tx.critical_anomaly_score}',\
    setvar:'tx.anomaly_score=+%{tx.critical_anomaly_score}'"

# ============================================
# XSS 攻击检测规则
# ============================================
SecRule ARGS|REQUEST_HEADERS:Referer "@detectXSS" \
    "id:100002,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    msg:'XSS Attack Detected',\
    tag:'attack-xss',\
    tag:'OWASP_CRS',\
    severity:'CRITICAL'"

# ============================================
# 路径遍历攻击检测
# ============================================
SecRule REQUEST_URI|ARGS "@rx (?i)(\.\./|\.\.\\/|%2e%2e%2f|%2e%2e/)" \
    "id:100003,\
    phase:2,\
    deny,\
    status:403,\
    t:none,\
    t:urlDecode,\
    t:normalizePath,\
    log,\
    msg:'Path Traversal Attack Detected',\
    tag:'attack-lfi',\
    severity:'CRITICAL'"

# ============================================
# 命令注入检测
# ============================================
SecRule ARGS|REQUEST_BODY "@rx (?i)(;|\||`|\$\(|&&|\|\|)\s*(?:cat|ls|pwd|wget|curl|bash|sh|nc|netcat|perl|python|ruby|php)" \
    "id:100004,\
    phase:2,\
    deny,\
    status:403,\
    t:lowercase,\
    t:urlDecode,\
    log,\
    msg:'Command Injection Attack Detected',\
    tag:'attack-rce',\
    severity:'CRITICAL'"

# ============================================
# IP 黑名单规则
# ============================================
SecRule REMOTE_ADDR "@ipMatch 192.168.100.0/24,10.0.0.0/8" \
    "id:100005,\
    phase:1,\
    deny,\
    status:403,\
    log,\
    msg:'Access denied - IP in blacklist'"

# ============================================
# 速率限制规则
# ============================================
SecAction \
    "id:100006,\
    phase:1,\
    nolog,\
    pass,\
    initcol:ip=%{REMOTE_ADDR},\
    setvar:ip.request_count=+1"

SecRule IP:REQUEST_COUNT "@gt 100" \
    "id:100007,\
    phase:1,\
    deny,\
    status:429,\
    log,\
    msg:'Rate limit exceeded - %{IP.REQUEST_COUNT} requests',\
    setvar:ip.blocked=1,\
    expirevar:ip.blocked=300"

# ============================================
# 文件上传检测
# ============================================
SecRule FILES_NAMES "@rx \.(php|jsp|asp|aspx|exe|sh|pl|py)$" \
    "id:100008,\
    phase:2,\
    deny,\
    status:403,\
    t:lowercase,\
    log,\
    msg:'Dangerous file upload attempt',\
    tag:'attack-upload',\
    severity:'CRITICAL'"

# ============================================
# 地理位置封锁
# ============================================
SecGeoLookupDb /usr/share/GeoIP/GeoLite2-Country.mmdb

SecRule REMOTE_ADDR "@geoLookup" \
    "chain,\
    id:100009,\
    phase:1,\
    deny,\
    status:403,\
    log,\
    msg:'Access denied - blocked country'"
    SecRule GEO:COUNTRY_CODE "@pm CN RU KP" ""

# ============================================
# 链式规则示例
# ============================================
SecRule REQUEST_FILENAME "@rx /admin/" \
    "chain,\
    id:100010,\
    phase:2,\
    pass,\
    log,\
    msg:'Admin area access attempt'"
    SecRule REMOTE_ADDR "!@ipMatch 192.168.1.0/24" \
        "deny,\
        status:403,\
        msg:'Unauthorized admin access'"

# ============================================
# 异常评分示例
# ============================================
SecRule TX:ANOMALY_SCORE "@ge 5" \
    "id:100011,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    msg:'Anomaly Score Exceeded: %{TX.ANOMALY_SCORE}'"

# ============================================
# 响应体检测 - 信息泄露
# ============================================
SecRule RESPONSE_BODY "@rx (?i)(mysql_error|syntax error|stack trace|exception)" \
    "id:100012,\
    phase:4,\
    pass,\
    log,\
    msg:'Information Leakage Detected',\
    tag:'info-leak',\
    severity:'WARNING'"

# ============================================
# 自定义标记和跳转
# ============================================
SecMarker "BEGIN_WHITELIST"

SecRule REQUEST_URI "@beginsWith /api/public/" \
    "id:100013,\
    phase:1,\
    pass,\
    nolog,\
    skipAfter:END_WHITELIST"

SecMarker "END_WHITELIST"

# ============================================
# 会话管理
# ============================================
SecRule REQUEST_COOKIES:PHPSESSID !^$ \
    "id:100014,\
    phase:2,\
    nolog,\
    pass,\
    setsid:%{REQUEST_COOKIES.PHPSESSID}"

# 检测会话异常
SecRule SESSION:LOGIN_COUNT "@gt 10" \
    "id:100015,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    msg:'Session abuse detected'"

# ============================================
# 规则管理示例
# ============================================
# 移除特定规则
SecRuleRemoveById 100001

# 更新规则目标 - 排除特定参数
SecRuleUpdateTargetById 100002 "!ARGS:csrf_token"

# 根据标签移除规则
SecRuleRemoveByTag "attack-dos"

# ============================================
# 包含其他规则文件
# ============================================
Include "rules/sql-injection.conf"
Include "rules/xss-attacks.conf"
Include "rules/*.conf"
